<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Test</title>
<style>
body{font-family:sans-serif;padding:40px;background:#0d1117;color:#fff;}
button{padding:20px;font-size:18px;background:#3b82f6;color:#fff;border:none;border-radius:10px;width:100%;margin-bottom:20px;}
#result{background:#1f2630;padding:20px;border-radius:10px;font-size:16px;}
</style>
</head>
<body>
<h1>Button Test</h1>
<button onclick="test1()">Tap Me - Test 1</button>
<button id="btn2">Tap Me - Test 2 (addEventListener)</button>
<div id="result">Nothing tapped yet</div>

<script>
function test1(){
  document.getElementById('result').textContent = 'Test 1 button WORKS! Time: ' + new Date().toLocaleTimeString();
}
document.getElementById('btn2').addEventListener('click', function(){
  document.getElementById('result').textContent = 'Test 2 button WORKS! Time: ' + new Date().toLocaleTimeString();
});
</script>
</body>
</html>
